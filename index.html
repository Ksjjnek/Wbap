<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.1); --border: rgba(255, 255, 255, 0.2); }
        body {
            background: radial-gradient(circle at center, #002b36 0%, #000 100%);
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; margin: 0; overflow: hidden; touch-action: none;
        }

        /* 3D Сцена */
        .scene { perspective: 1200px; margin-top: 100px; cursor: grab; }
        
        .card-container {
            width: 320px; height: 190px;
            position: relative; transform-style: preserve-3d;
            transition: transform 0.1s;
        }

        /* Общие стили граней */
        .card-face {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; padding: 25px;
            box-sizing: border-box; border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            backface-visibility: visible;
        }

        /* Передняя грань (стекло) */
        .front {
            background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
            transform: translateZ(5px); /* Смещение вперед */
            z-index: 2;
        }

        /* Задняя грань */
        .back {
            background: rgba(255, 255, 255, 0.05);
            transform: translateZ(-5px) rotateY(180deg);
        }

        /* Боковые грани (толщина) */
        .side {
            position: absolute; background: rgba(255, 255, 255, 0.2);
            filter: blur(1px);
        }
        .side-top, .side-bottom { width: 320px; height: 10px; }
        .side-left, .side-right { width: 10px; height: 190px; }
        
        .side-top { transform: rotateX(90deg) translateZ(5px); top: -5px; width: 280px; left: 20px; }
        .side-bottom { transform: rotateX(90deg) translateZ(-185px); bottom: -185px; width: 280px; left: 20px; }

        /* Текст на карте */
        .chip { width: 45px; height: 35px; background: linear-gradient(45deg, #ffd700, #b8860b); border-radius: 5px; margin-bottom: 20px; }
        .card-num { font-size: 20px; letter-spacing: 3px; font-family: monospace; text-shadow: 0 2px 4px black; }
        .holder { font-size: 12px; margin-top: 30px; opacity: 0.7; text-transform: uppercase; }
        .bal-val { position: absolute; bottom: 25px; right: 25px; font-size: 24px; font-weight: bold; color: #00ffcc; }

        /* Кнопки */
        .controls { margin-top: 80px; display: flex; flex-direction: column; gap: 15px; width: 80%; }
        .btn {
            padding: 16px; border: none; border-radius: 12px; font-weight: bold; font-size: 15px; cursor: pointer;
            transition: 0.3s;
        }
        .btn-main { background: #00ffcc; color: #001f3f; box-shadow: 0 5px 15px rgba(0,255,204,0.3); }
        .btn-test { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="scene" id="scene">
        <div class="card-container" id="card">
            <div class="side side-top"></div>
            <div class="side side-bottom"></div>
            
            <div class="card-face front">
                <div class="chip"></div>
                <div class="card-num" id="c-num">0000 0000 0000 0000</div>
                <div class="holder" id="c-name">NAME SURNAME</div>
                <div class="bal-val" id="c-bal">0.00 ₽</div>
            </div>
            
            <div class="card-face back">
                <div style="width: 100%; height: 40px; background: #000; margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-main" onclick="deposit()">ПОПОЛНИТЬ</button>
        <button class="btn btn-test" onclick="checkConnection()">ПРОВЕРИТЬ СВЯЗЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Парсим данные из URL
        const params = new URLSearchParams(window.location.search);
        document.getElementById('c-num').innerText = params.get('card') || 'НЕТ НОМЕРА';
        document.getElementById('c-bal').innerText = parseFloat(params.get('bal') || 0).toFixed(2) + ' ₽';
        document.getElementById('c-name').innerText = params.get('name') || 'USER';

        // 3D вращение с инерцией
        let card = document.getElementById('card');
        let rX = 20, rY = -20, vX = 0, vY = 0, isDown = false, lX, lY;

        document.addEventListener('pointerdown', e => { isDown = true; lX = e.clientX; lY = e.clientY; });
        document.addEventListener('pointermove', e => {
            if(!isDown) return;
            vX = (e.clientX - lX) * 0.5; vY = (e.clientY - lY) * 0.5;
            rY += vX; rX -= vY;
            lX = e.clientX; lY = e.clientY;
        });
        document.addEventListener('pointerup', () => isDown = false);

        function animate() {
            if(!isDown) { rY += vX; rX -= vY; vX *= 0.95; vY *= 0.95; }
            card.style.transform = `rotateX(${rX}deg) rotateY(${rY}deg)`;
            requestAnimationFrame(animate);
        }
        animate();

        function deposit() {
            tg.sendData("action_deposit");
            tg.close();
        }

        function checkConnection() {
            // Генерируем 3 случайные цифры
            const code = Math.floor(100 + Math.random() * 900);
            alert("Проверка связи... Код: " + code);
            // Отправляем код боту
            tg.sendData("check_" + code);
            tg.close();
        }
    </script>
</body>
</html>
