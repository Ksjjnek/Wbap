<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #001f3f 0%, #002b1b 100%);
            color: white; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; margin: 0; overflow: hidden; touch-action: none;
        }
        .header {
            width: 100%; display: flex; justify-content: flex-end;
            padding: 20px; box-sizing: border-box; align-items: center; gap: 10px;
        }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #00ffcc; background: #000; }
        
        .card-box { perspective: 1000px; margin-top: 60px; cursor: grab; }
        .card {
            width: 310px; height: 185px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px); border-radius: 20px;
            border: 1px solid rgba(0, 255, 204, 0.3);
            padding: 25px; transform-style: preserve-3d;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative;
        }
        .card h1 { margin: 0; font-size: 26px; color: #00ffcc; letter-spacing: 2px; }
        .card-info { margin-top: 40px; font-family: monospace; font-size: 14px; color: #ccc; }
        .bal-wrap { position: absolute; bottom: 25px; right: 25px; text-align: right; }
        .bal-val { font-size: 26px; font-weight: bold; color: #00ffcc; }

        .btn {
            margin-top: 70px; padding: 16px 60px;
            background: #00ffcc; color: #001f3f;
            border: none; border-radius: 12px;
            font-weight: bold; font-size: 16px;
            box-shadow: 0 5px 20px rgba(0, 255, 204, 0.4);
        }
    </style>
</head>
<body>

    <div class="header">
        <span id="top-name">User</span>
        <img id="top-ava" class="avatar" src="https://via.placeholder.com/45" alt="">
    </div>

    <div class="card-box" id="box">
        <div class="card" id="card">
            <h1>BPay</h1>
            <div class="card-info">
                <div id="card-id">ID: 000000000</div>
                <div id="card-name">@username</div>
            </div>
            <div class="bal-wrap">
                <div style="font-size: 10px; opacity: 0.6;">БАЛАНС</div>
                <div class="bal-val" id="card-bal">0.00 ₽</div>
            </div>
        </div>
    </div>

    <button class="btn" onclick="sendDep()">ПОПОЛНИТЬ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ЧИТАЕМ ДАННЫЕ ИЗ URL (самый надежный способ)
        const params = new URLSearchParams(window.location.search);
        const urlBal = params.get('bal') || "0.00";
        const urlId = params.get('id') || "Неизвестно";
        const urlName = params.get('name') || "User";

        // Если Telegram отдал данные через API, берем их, если нет — берем из URL
        const user = tg.initDataUnsafe?.user;
        const finalName = user ? (user.username || user.first_name) : urlName;
        const finalId = user ? user.id : urlId;

        document.getElementById('top-name').innerText = finalName;
        document.getElementById('card-name').innerText = '@' + finalName;
        document.getElementById('card-id').innerText = 'ID: ' + finalId;
        document.getElementById('card-bal').innerText = parseFloat(urlBal).toFixed(2) + ' ₽';
        
        if (user && user.photo_url) {
            document.getElementById('top-ava').src = user.photo_url;
        }

        // 3D ВРАЩЕНИЕ
        let card = document.getElementById('card');
        let box = document.getElementById('box');
        let rX = 0, rY = 0, vX = 0, vY = 0, isDown = false, lX, lY;

        box.onpointerdown = e => { isDown = true; lX = e.clientX; lY = e.clientY; vX = 0; vY = 0; };
        window.onpointermove = e => {
            if(!isDown) return;
            vX = (e.clientX - lX) * 0.5; vY = (e.clientY - lY) * 0.5;
            rY += vX; rX -= vY;
            lX = e.clientX; lY = e.clientY;
        };
        window.onpointerup = () => isDown = false;

        function render() {
            if(!isDown) { rY += vX; rX -= vY; vX *= 0.95; vY *= 0.95; }
            card.style.transform = `rotateX(${rX}deg) rotateY(${rY}deg)`;
            requestAnimationFrame(render);
        }
        render();

        function sendDep() {
            tg.sendData("action_deposit");
            tg.close();
        }
    </script>
</body>
</html>
