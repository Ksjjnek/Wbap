<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0; padding: 0; width: 800px; height: 500px;
            background: linear-gradient(135deg, #0088cc, #00aaff);
            font-family: 'Arial', sans-serif; color: white;
            display: flex; flex-direction: column; justify-content: space-between;
            overflow: hidden; position: relative;
        }
        /* Цена справа */
        .price-container {
            position: absolute; right: 50px; top: 150px; text-align: right;
        }
        .price-label { font-size: 24px; opacity: 0.8; }
        .price-value { font-size: 80px; font-weight: bold; margin-top: 10px; }
        
        /* Процент выгоды */
        .profit-tag {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px; border-radius: 15px;
            font-size: 20px; margin-top: 20px; display: none;
        }

        /* 3D Логотип TON снизу слева */
        .ton-logo {
            position: absolute; bottom: -20px; left: 20px;
            width: 300px; filter: drop-shadow(0 20px 50px rgba(0,0,0,0.3));
            transform: perspective(500px) rotateY(10deg);
        }

        /* Блок пользователя снизу */
        .user-block {
            position: absolute; bottom: 30px; right: 50px;
            display: flex; align-items: center; gap: 15px;
        }
        .avatar {
            width: 60px; height: 60px; border-radius: 50%;
            border: 3px solid white; object-fit: cover;
        }
        .username { font-size: 24px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="price-container">
        <div class="price-label">Курс TON сегодня</div>
        <div id="price" class="price-value">0.00 ₽</div>
        <div id="profit" class="profit-tag"></div>
    </div>

    <img class="ton-logo" src="https://ton.org/download/ton_symbol.png" alt="TON">

    <div class="user-block">
        <span id="nickname" class="username">@user</span>
        <img id="avatar" class="avatar" src="" alt="">
    </div>

    <script>
        // Получаем параметры из URL
        const params = new URLSearchParams(window.location.search);
        if(params.get('price')) document.getElementById('price').innerText = params.get('price') + ' ₽';
        if(params.get('user')) document.getElementById('nickname').innerText = '@' + params.get('user');
        if(params.get('avatar')) document.getElementById('avatar').src = params.get('avatar');
        
        const profit = params.get('profit');
        if(profit) {
            const p Tag = document.getElementById('profit');
            pTag.innerText = profit;
            pTag.style.display = 'inline-block';
        }
    </script>
</body>
</html>
