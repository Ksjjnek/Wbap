<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BPay Админ-панель</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* --- СТИЛИ (CSS) --- */
        body {
            background-color: #1c1c1e;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Экран загрузки */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1c1c1e;
            display: none; /* Скрыт по умолчанию */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #0088cc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loading-text { font-size: 16px; font-weight: bold; color: #aaaaaa; }

        /* Авторизация и Дашборд */
        .container { max-width: 600px; margin: 0 auto; }
        .box { background: #2c2c2e; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        
        input, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: none;
            box-sizing: border-box;
            font-size: 16px;
        }
        input { background: #1c1c1e; color: white; border: 1px solid #3a3a3c; }
        button { background: #0088cc; color: white; font-weight: bold; cursor: pointer; }
        button:active { background: #0077b3; }
        
        .btn-danger { background: #ff3b30; }
        .btn-success { background: #34c759; }
        
        /* Карточка пользователя */
        .user-card {
            background: #3a3a3c;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .user-header { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #555; padding-bottom: 10px; }
        .user-info span { display: block; margin-bottom: 5px; color: #ccc; }
        .user-info strong { color: white; }
        .banned-text { color: #ff3b30 !important; font-weight: bold; }
        .active-text { color: #34c759 !important; }
        .action-row { display: flex; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="loading-text">Будим сервер...</div>
    </div>

    <div id="login-container" class="container">
        <div class="box">
            <h2 style="text-align: center; margin-top: 0;">Вход в Админку</h2>
            <input type="text" id="login-input" placeholder="Логин">
            <input type="password" id="password-input" placeholder="Пароль">
            <button onclick="login()">Войти</button>
        </div>
    </div>

    <div id="dashboard" class="container" style="display: none;">
        <h2>Пользователи</h2>
        <div id="users-list"></div>
    </div>

    <script>
        // --- ВАЖНАЯ НАСТРОЙКА ---
        // Вставь сюда ссылку на твой Render, чтобы сайт знал, куда отправлять запросы
        const BACKEND_URL = "https://wbap.onrender.com"; 

        // --- ЛОГИКА ЗАГРУЗКИ ---
        const loadingScreen = document.getElementById('loading-screen');
        const loadingText = document.getElementById('loading-text');
        let loadingInterval;
        const phrases = ["Будим сервер...", "Проверяем базу данных...", "Собираем данные...", "Почти готово..."];

        function showLoader() {
            loadingScreen.style.display = 'flex';
            loadingScreen.style.opacity = '1';
            let i = 0;
            loadingText.innerText = phrases[0];
            loadingInterval = setInterval(() => {
                i = (i + 1) % phrases.length;
                loadingText.innerText = phrases[i];
            }, 2500);
        }

        function hideLoader() {
            clearInterval(loadingInterval);
            loadingScreen.style.opacity = '0';
            setTimeout(() => loadingScreen.style.display = 'none', 300);
        }

        // --- АВТОРИЗАЦИЯ ---
        function login() {
            const loginVal = document.getElementById('login-input').value;
            const passVal = document.getElementById('password-input').value;
            
            showLoader(); // Показываем загрузку, пока Render просыпается

            fetch(`${BACKEND_URL}/api/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login: loginVal, password: passVal })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('login-container').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    loadUsers(); // Грузим юзеров
                } else {
                    hideLoader();
                    alert("Неверный логин или пароль!");
                }
            })
            .catch(err => {
                hideLoader();
                alert("Ошибка соединения с сервером.");
            });
        }

        // --- ЗАГРУЗКА ПОЛЬЗОВАТЕЛЕЙ ---
        function loadUsers() {
            fetch(`${BACKEND_URL}/api/admin/users`)
            .then(res => res.json())
            .then(users => {
                const list = document.getElementById('users-list');
                list.innerHTML = ''; // Очищаем список
                
                users.forEach(u => {
                    // Проверяем статус бана
                    let statusHtml = u.banned 
                        ? `<span id="status-${u.id}" class="banned-text">Забанен</span>`
                        : `<span id="status-${u.id}" class="active-text">Активен</span>`;

                    list.innerHTML += `
                        <div class="user-card">
                            <div class="user-header">
                                <strong>${u.name} (ID: ${u.id})</strong>
                                ${statusHtml}
                            </div>
                            <div class="user-info">
                                <span>Баланс: <strong id="balance-${u.id}">${u.balance || 0}</strong> звезд</span>
                            </div>
                            
                            <div class="action-row">
                                <input type="number" id="amount-${u.id}" placeholder="Сумма" style="margin-bottom:0;">
                                <button onclick="action('topup', '${u.id}')">Пополнить</button>
                            </div>
                            <div class="action-row">
                                <button class="btn-danger" onclick="action('ban', '${u.id}')">Бан</button>
                                <button class="btn-success" onclick="action('unban', '${u.id}')">Разбан</button>
                            </div>
                        </div>
                    `;
                });
                hideLoader(); // Сервер ответил, данные готовы, прячем загрузку
            })
            .catch(err => {
                hideLoader();
                alert("Не удалось загрузить пользователей");
            });
        }

        // --- ВЗАИМОДЕЙСТВИЕ (БЕЗ ПЕРЕЗАГРУЗКИ) ---
        function action(type, tg_id) {
            let amount = 0;
            let reason = '';
            let duration = '';

            // Собираем данные в зависимости от действия
            if (type === 'topup') {
                amount = document.getElementById(`amount-${tg_id}`).value;
                if (!amount) return alert('Введите сумму!');
            } else if (type === 'ban') {
                reason = prompt("Причина бана:");
                if (reason === null) return; // Отмена
                duration = prompt("Срок бана (например: навсегда):", "навсегда");
                if (duration === null) return;
            }

            // Отправляем запрос на сервер (в фоновом режиме)
            fetch(`${BACKEND_URL}/api/admin/action`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: type, tg_id: tg_id, amount: amount, reason: reason, duration: duration })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    // --- МГНОВЕННОЕ ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ---
                    
                    if (type === 'topup') {
                        const balanceEl = document.getElementById(`balance-${tg_id}`);
                        const currentVal = parseFloat(balanceEl.innerText) || 0;
                        balanceEl.innerText = currentVal + parseFloat(amount);
                        document.getElementById(`amount-${tg_id}`).value = ''; // очищаем инпут
                    } 
                    else if (type === 'ban') {
                        const statusEl = document.getElementById(`status-${tg_id}`);
                        statusEl.innerText = 'Забанен';
                        statusEl.className = 'banned-text';
                    } 
                    else if (type === 'unban') {
                        const statusEl = document.getElementById(`status-${tg_id}`);
                        statusEl.innerText = 'Активен';
                        statusEl.className = 'active-text';
                    }
                } else {
                    alert("Ошибка: " + data.error);
                }
            });
        }
    </script>
</body>
</html>
