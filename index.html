<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BPay Admin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #1c1c1e);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #aaaaaa);
            --button-color: var(--tg-theme-button-color, #0088cc);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #2c2c2e);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        /* Красивая загрузка */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        .loader-dots { display: flex; gap: 8px; margin-bottom: 15px; }
        .dot { width: 12px; height: 12px; background: var(--button-color); border-radius: 50%; animation: pulse 1.5s infinite; }
        .dot:nth-child(2) { animation-delay: 0.3s; }
        .dot:nth-child(3) { animation-delay: 0.6s; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }

        /* Карточка профиля из Telegram */
        .user-profile-card {
            background: var(--secondary-bg);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .user-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--button-color); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }
        .user-details b { display: block; font-size: 16px; }
        .user-details span { color: var(--hint-color); font-size: 13px; }

        /* Стили кнопок и инпутов */
        .box { background: var(--secondary-bg); padding: 20px; border-radius: 15px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--button-color); color: var(--button-text); font-weight: bold; font-size: 16px; cursor: pointer; }
        
        /* Список юзеров */
        .user-item { background: var(--secondary-bg); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .flex-row { display: flex; justify-content: space-between; align-items: center; }
        .status-active { color: #34c759; }
        .status-banned { color: #ff3b30; }
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-small { padding: 8px; font-size: 13px; }
        .btn-ban { background: #ff3b30; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div id="loading-text" style="color: var(--hint-color);">Проверяем соединение...</div>
    </div>

    <div id="admin-card" class="user-profile-card" style="display: none;">
        <div id="admin-avatar" class="user-avatar">?</div>
        <div class="user-details">
            <b id="admin-name">Загрузка...</b>
            <span id="admin-id">ID: 000000</span>
        </div>
    </div>

    <div id="login-form" class="box" style="display: none;">
        <h3 style="margin-top: 0;">Вход в управление</h3>
        <input type="text" id="log" placeholder="Логин">
        <input type="password" id="pas" placeholder="Пароль">
        <button onclick="tryLogin()">Войти</button>
    </div>

    <div id="main-content" style="display: none;">
        <h3>Список пользователей</h3>
        <div id="users-list"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const API = "https://ТВОЙ-RENDER.onrender.com"; // ЗАМЕНИ НА СВОЮ

        // Инициализация данных из ТГ
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            document.getElementById('admin-name').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('admin-id').innerText = "ID: " + user.id;
            document.getElementById('admin-avatar').innerText = user.first_name[0];
            document.getElementById('admin-card').style.display = 'flex';
        }

        // Плавная загрузка
        const phrases = ["Связываемся с базой...", "Расставляем по полочкам...", "Проверяем права..."];
        let pIdx = 0;
        setInterval(() => {
            pIdx = (pIdx + 1) % phrases.length;
            document.getElementById('loading-text').innerText = phrases[pIdx];
        }, 2000);

        // Показываем логин после микро-паузы для красоты
        setTimeout(() => {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('login-form').style.display = 'block';
            }, 500);
        }, 3000);

        function tryLogin() {
            const l = document.getElementById('log').value;
            const p = document.getElementById('pas').value;
            
            fetch(`${API}/api/admin/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({login: l, password: p})
            })
            .then(r => r.json())
            .then(data => {
                if(data.success) {
                    document.getElementById('login-form').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                    loadUsers();
                } else {
                    alert("Неверные данные!");
                }
            });
        }

        function loadUsers() {
            fetch(`${API}/api/admin/users`)
            .then(r => r.json())
            .then(users => {
                const container = document.getElementById('users-list');
                container.innerHTML = users.map(u => `
                    <div class="user-item">
                        <div class="flex-row">
                            <b>${u.name}</b>
                            <span id="st-${u.id}" class="${u.banned ? 'status-banned' : 'status-active'}">
                                ${u.banned ? 'Забанен' : 'Активен'}
                            </span>
                        </div>
                        <div style="margin-top:5px; font-size:14px; color: var(--hint-color)">
                            Баланс: <span id="bal-${u.id}" style="color:#fff">${u.balance}</span> ⭐
                        </div>
                        <div class="action-btns">
                            <button class="btn-small" onclick="doAction('topup', '${u.id}')">+ Пополнить</button>
                            <button class="btn-small btn-ban" onclick="doAction('${u.banned ? 'unban' : 'ban'}', '${u.id}')">
                                ${u.banned ? 'Разбанить' : 'Бан'}
                            </button>
                        </div>
                    </div>
                `).join('');
            });
        }

        function doAction(type, id) {
            let val = type === 'topup' ? prompt("Сколько звезд начислить?") : null;
            if (type === 'topup' && !val) return;

            fetch(`${API}/api/admin/action`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action: type, tg_id: id, amount: val})
            })
            .then(r => r.json())
            .then(data => {
                if(data.success) {
                    if(type === 'topup') {
                        const b = document.getElementById(`bal-${id}`);
                        b.innerText = parseFloat(b.innerText) + parseFloat(val);
                    } else {
                        // Мгновенная смена статуса
                        const st = document.getElementById(`st-${id}`);
                        const isBan = type === 'ban';
                        st.innerText = isBan ? 'Забанен' : 'Активен';
                        st.className = isBan ? 'status-banned' : 'status-active';
                    }
                }
            });
        }
    </script>
</body>
</html>
