<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Конфет</title>
    <style>
        body { font-family: sans-serif; background-color: #2b2b2b; color: white; padding: 20px; }
        .wbap-hidden { display: none !important; }
        .wbap-btn {
            padding: 12px 20px; margin: 5px; cursor: pointer; border: none; 
            border-radius: 8px; background: #4CAF50; color: white; font-weight: bold;
        }
        .wbap-btn-blue { background: #2196F3; }
        .wbap-lupa-icon {
            font-size: 50px; cursor: pointer; display: inline-block; margin: 20px 0; transition: 0.3s;
        }
        .wbap-pulse { animation: wbap-pulse-anim 2s infinite; opacity: 0.7; }
        @keyframes wbap-pulse-anim { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .wbap-glow { animation: wbap-glow-anim 1s infinite; color: #ffeb3b; text-shadow: 0 0 20px #ffeb3b; }
        @keyframes wbap-glow-anim { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.5); } }
        #wbap-chat-box {
            margin-top: 20px; border: 1px solid #555; border-radius: 10px; padding: 10px;
            max-width: 350px; background: #333;
        }
        #wbap-chat-messages {
            height: 200px; overflow-y: auto; margin-bottom: 10px; border-bottom: 1px solid #555; padding-bottom: 5px; font-size: 14px;
        }
        .wbap-msg { margin-bottom: 8px; }
        .wbap-time { font-size: 11px; color: #aaa; margin-left: 5px; }
        input[type="text"] {
            flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #555; background: #444; color: white;
        }
    </style>
</head>
<body>

    <h2>Управление продажами</h2>
    <button onclick="sellCandies()" class="wbap-btn wbap-btn-blue">Выставить 10 конфет</button>
    <button onclick="simulateBuy()" class="wbap-btn">[Тест] Имитация покупки</button>

    <div id="wbap-status-area" class="wbap-hidden">
        <div id="wbap-lupa" class="wbap-lupa-icon">🔍</div>
        <div id="wbap-mini-menu" class="wbap-hidden">
            <button onclick="finalAction('success')" class="wbap-btn">Продать</button>
            <button onclick="finalAction('skip')" class="wbap-btn" style="background:#f44336;">Пропустить</button>
            <button onclick="toggleChat()" class="wbap-btn wbap-btn-blue">Открыть чат</button>
        </div>
    </div>

    <div id="wbap-chat-box" class="wbap-hidden">
        <div id="wbap-chat-messages"></div>
        <div style="display: flex; gap: 5px; margin-top: 10px;">
            <input type="text" id="wbap-chat-input" placeholder="Введите сообщение...">
            <button onclick="sendMessage()" class="wbap-btn">Отправить</button>
        </div>
    </div>

    <script>
        // ВАЖНО: Замени этот URL на адрес твоего сервера на Timeweb
        const API_URL = "https://bpaybot.site"; 
        const SECRET_TOKEN = "Wbap_Secret_12345";

        let currentAdId = null;
        let statusInterval = null;
        let chatInterval = null;

        async function apiRequest(endpoint, method = 'GET', body = null) {
            const options = {
                method: method,
                headers: { 'Content-Type': 'application/json', 'X-App-Token': SECRET_TOKEN }
            };
            if (body) options.body = JSON.stringify(body);
            try {
                const res = await fetch(`${API_URL}${endpoint}`, options);
                return await res.json();
            } catch (e) {
                console.error("Ошибка соединения с сервером:", e);
            }
        }

        async function sellCandies() {
            const data = await apiRequest('/sell', 'POST', { item: "Конфеты", count: 10 });
            if(data && data.id) {
                currentAdId = data.id;
                document.getElementById('wbap-status-area').classList.remove('wbap-hidden');
                const lupa = document.getElementById('wbap-lupa');
                lupa.classList.add('wbap-pulse');
                lupa.classList.remove('wbap-glow');
                startStatusMonitoring();
            }
        }

        function startStatusMonitoring() {
            if (statusInterval) clearInterval(statusInterval);
            statusInterval = setInterval(async () => {
                const data = await apiRequest(`/check_status/${currentAdId}`);
                if (data && data.status === 'pending') {
                    document.getElementById('wbap-lupa').classList.replace('wbap-pulse', 'wbap-glow');
                    document.getElementById('wbap-mini-menu').classList.remove('wbap-hidden');
                    clearInterval(statusInterval);
                }
            }, 3000);
        }

        async function finalAction(type) {
            await apiRequest(`/confirm/${currentAdId}?action=${type}`, 'POST');
            document.getElementById('wbap-status-area').classList.add('wbap-hidden');
            document.getElementById('wbap-mini-menu').classList.add('wbap-hidden');
            document.getElementById('wbap-chat-box').classList.add('wbap-hidden');
            if (chatInterval) clearInterval(chatInterval);
            alert("Действие выполнено!");
        }

        function toggleChat() {
            const chatBox = document.getElementById('wbap-chat-box');
            chatBox.classList.toggle('wbap-hidden');
            if (!chatBox.classList.contains('wbap-hidden')) {
                loadChat();
                if (chatInterval) clearInterval(chatInterval);
                chatInterval = setInterval(loadChat, 3000);
            } else {
                clearInterval(chatInterval);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('wbap-chat-input');
            if (!input.value) return;
            await apiRequest(`/chat/${currentAdId}/send`, 'POST', { sender: "Продавец", text: input.value });
            input.value = '';
            loadChat();
        }

        async function loadChat() {
            if (!currentAdId) return;
            const messages = await apiRequest(`/chat/${currentAdId}/history`);
            if(!messages) return;
            const container = document.getElementById('wbap-chat-messages');
            container.innerHTML = messages.map(m => `
                <div class="wbap-msg"><b>${m.sender}:</b> ${m.text} <span class="wbap-time">${m.time}</span></div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        async function simulateBuy() {
            if(!currentAdId) return alert("Сначала выставь товар!");
            await apiRequest(`/buy/${currentAdId}`, 'POST');
        }
    </script>
</body>
</html>
