<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #020d18 0%, #011a0e 100%);
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 20px;
            box-sizing: border-box;
        }

        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #00ffcc; }

        .card-container {
            perspective: 1000px;
            margin-top: 50px;
            cursor: grab;
        }

        .card {
            width: 310px;
            height: 185px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 204, 0.2);
            padding: 25px;
            transform-style: preserve-3d;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            position: relative;
        }

        .card h1 { margin: 0; font-size: 28px; color: #00ffcc; font-style: italic; }
        .card-info { margin-top: 40px; font-family: monospace; font-size: 15px; }
        .balance-box { position: absolute; bottom: 25px; right: 25px; text-align: right; }
        .balance-val { font-size: 24px; color: #00ffcc; font-weight: bold; }

        .btn {
            margin-top: 80px;
            padding: 16px 50px;
            background: #00ffcc;
            color: #011a0e;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        }
    </style>
</head>
<body>

    <div class="header">
        <img id="u-pic" class="avatar" src="" alt="">
    </div>

    <div class="card-container" id="box">
        <div class="card" id="card">
            <h1>BPay</h1>
            <div class="card-info">
                <div id="u-id">ID: ...</div>
                <div id="u-name">@username</div>
            </div>
            <div class="balance-box">
                <div style="font-size: 10px; opacity: 0.6;">БАЛАНС</div>
                <div class="balance-val" id="u-bal">0.00 ₽</div>
            </div>
        </div>
    </div>

    <button class="btn" onclick="deposit()">ПОПОЛНИТЬ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Данные юзера
        const u = tg.initDataUnsafe.user;
        if(u) {
            document.getElementById('u-name').innerText = '@' + (u.username || 'user');
            document.getElementById('u-id').innerText = 'ID: ' + u.id;
            document.getElementById('u-pic').src = u.photo_url || 'https://via.placeholder.com/45';
        }

        // Баланс
        const params = new URLSearchParams(window.location.search);
        document.getElementById('u-bal').innerText = (params.get('bal') || 0) + ' ₽';

        // 3D Вращение
        let card = document.getElementById('card');
        let box = document.getElementById('box');
        let rX = 0, rY = 0, vX = 0, vY = 0, isDown = false, lX, lY;

        box.onpointerdown = e => { isDown = true; lX = e.clientX; lY = e.clientY; vX = 0; vY = 0; };
        window.onpointermove = e => {
            if(!isDown) return;
            vX = (e.clientX - lX) * 0.5; vY = (e.clientY - lY) * 0.5;
            rY += vX; rX -= vY;
            lX = e.clientX; lY = e.clientY;
        };
        window.onpointerup = () => isDown = false;

        function loop() {
            if(!isDown) { rY += vX; rX -= vY; vX *= 0.95; vY *= 0.95; }
            card.style.transform = `rotateX(${rX}deg) rotateY(${rY}deg)`;
            requestAnimationFrame(loop);
        }
        loop();

        function deposit() {
            tg.sendData("action_deposit");
            tg.close();
        }
    </script>
</body>
</html>
