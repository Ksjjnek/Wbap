<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPay Premium Glass</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            /* Темный базовый фон */
            background: #03070b; 
            color: white; font-family: 'Orbitron', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden; perspective: 1200px;
        }

        /* Те самые размытые изюминки на фоне */
        .bg-blob {
            position: absolute; border-radius: 50%; filter: blur(100px); z-index: -1;
        }
        .blob-blue { width: 350px; height: 350px; background: rgba(0, 80, 200, 0.4); top: 5%; left: 0%; }
        .blob-green { width: 400px; height: 400px; background: rgba(0, 200, 120, 0.25); bottom: 5%; right: -5%; }

        /* Уведомление */
        #notify {
            position: fixed; top: -120px;
            background: linear-gradient(135deg, rgba(0, 255, 204, 0.2), rgba(0, 100, 255, 0.2));
            backdrop-filter: blur(20px);
            padding: 20px 50px; border-radius: 20px;
            border: 1px solid rgba(0, 255, 204, 0.4);
            transition: 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.2);
            z-index: 1000; font-weight: bold; text-align: center;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* Контейнер карты */
        .card-container {
            width: 340px; height: 215px;
            position: relative; transform-style: preserve-3d;
            /* Убрали transition, так как теперь анимируем через JS для плавности */
        }

        /* Слои карты для реалистичной тонкой толщины */
        .layer {
            position: absolute; inset: 0; border-radius: 20px;
            box-sizing: border-box; backface-visibility: hidden;
        }

        /* Передняя часть карты */
        .front {
            /* Темно-синий и темно-зеленый прозрачный градиент */
            background: linear-gradient(135deg, rgba(10, 40, 80, 0.65), rgba(10, 60, 45, 0.5));
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); /* Легкий блик сверху */
            transform: translateZ(1.5px);
            display: flex; flex-direction: column; padding: 25px;
            justify-content: space-between;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.05), 0 20px 50px rgba(0,0,0,0.6);
        }

        /* Тонкий край (основа) */
        .middle {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255,255,255,0.15);
            transform: translateZ(0px);
        }

        /* Задняя часть карты */
        .back {
            background: linear-gradient(135deg, rgba(10, 40, 80, 0.8), rgba(10, 60, 45, 0.7));
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateZ(-1.5px) rotateY(180deg);
        }

        /* Дизайн внутренностей */
        .chip { 
            width: 48px; height: 35px; 
            background: linear-gradient(135deg, #e6c27a, #997328, #e6c27a); 
            border-radius: 6px; box-shadow: 0 0 8px rgba(230,194,122,0.4);
            position: relative; overflow: hidden;
        }
        .chip::after { content: ''; position: absolute; inset: 4px; border: 1px solid rgba(0,0,0,0.3); border-radius: 3px; }
        
        .card-num { font-size: 21px; letter-spacing: 3px; color: #fff; margin: 25px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .balance { font-size: 26px; color: #00ffcc; font-weight: bold; text-shadow: 0 0 15px rgba(0,255,204,0.4); }
        
        /* Свечение при сообщении */
        .glow .front {
            animation: neonGlow 2s infinite;
        }
        @keyframes neonGlow {
            0%, 100% { box-shadow: inset 0 0 20px rgba(255,255,255,0.05), 0 0 20px rgba(0, 255, 204, 0.2); border-color: rgba(0, 255, 204, 0.3); }
            50% { box-shadow: inset 0 0 20px rgba(255,255,255,0.05), 0 0 40px rgba(0, 255, 204, 0.7); border-color: rgba(0, 255, 204, 0.8); }
        }
    </style>
</head>
<body>

    <div class="bg-blob blob-blue"></div>
    <div class="bg-blob blob-green"></div>

    <div id="notify">Система онлайн</div>

    <div class="card-container" id="card">
        <div class="layer back"></div>
        <div class="layer middle"></div>
        <div class="layer front">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div class="chip"></div>
                <div style="text-align: right;">
                    <div style="font-size: 14px; letter-spacing: 2px; color: #fff; opacity: 0.8;">BPAY</div>
                    <div style="font-size: 8px; opacity: 0.4; letter-spacing: 1px;">DIGITAL</div>
                </div>
            </div>
            <div class="card-num">4825 6559 1926 4410</div>
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                <div>
                    <div style="font-size: 9px; opacity: 0.5; letter-spacing: 2px; margin-bottom: 3px;">CARDHOLDER</div>
                    <div style="font-size: 14px; font-weight: bold; text-transform: uppercase;">ꘜ Работяга</div>
                </div>
                <div class="balance">74 200 ₽</div>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        const notify = document.getElementById('notify');
        
        // --- ПОДКЛЮЧЕНИЕ К PYTHON (NTFY) ---
        const TOPIC = "ksjjnek_bpay_secure_channel"; // Тот же самый канал!
        const eventSource = new EventSource(`https://ntfy.sh/${TOPIC}/sse`);

        eventSource.onmessage = (event) => {
            const data = JSON.parse(event.data);
            notify.innerText = data.message;
            notify.style.top = "40px";
            card.classList.add('glow');

            setTimeout(() => {
                notify.style.top = "-120px";
                card.classList.remove('glow');
            }, 5000);
        };

        // --- ПЛАВНАЯ ФИЗИКА (LERP) ---
        let targetRx = 15, targetRy = -15; // Куда стремится карта
        let currentRx = 15, currentRy = -15; // Где она сейчас
        let isDown = false, lastX, lastY;

        // Отслеживаем касания/мышь
        document.onpointerdown = e => { isDown = true; lastX = e.clientX; lastY = e.clientY; };
        document.onpointermove = e => {
            if(!isDown) return;
            // Чувствительность вращения
            targetRy += (e.clientX - lastX) * 0.35;
            targetRx -= (e.clientY - lastY) * 0.35;
            lastX = e.clientX; lastY = e.clientY;
        };
        document.onpointerup = () => { isDown = false; };
        document.onpointerleave = () => { isDown = false; };

        // Анимационный цикл (60 кадров в секунду)
        function animate() {
            // Формула плавности (чем меньше 0.08, тем более "вязким" и плавным будет движение)
            currentRx += (targetRx - currentRx) * 0.08;
            currentRy += (targetRy - currentRy) * 0.08;
            
            card.style.transform = `rotateX(${currentRx}deg) rotateY(${currentRy}deg)`;
            requestAnimationFrame(animate); // Зацикливаем
        }
        animate(); // Запускаем движок
    </script>
</body>
</html>
