<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPay Premium Glass v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #03070b;
            --accent-green: #00ffcc;
            --accent-blue: #0064ff;
        }

        body {
            background: var(--bg-color);
            color: white;
            font-family: 'Orbitron', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden; perspective: 1500px;
        }

        /* Декоративные пятна фона */
        .bg-blob { position: absolute; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.5; }
        .blob-blue { width: 400px; height: 400px; background: var(--accent-blue); top: -10%; left: -10%; }
        .blob-green { width: 500px; height: 500px; background: var(--accent-green); bottom: -15%; right: -10%; opacity: 0.2; }

        /* Уведомление */
        #notify {
            position: fixed; top: -120px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            padding: 18px 45px; border-radius: 50px;
            border: 1px solid rgba(0, 255, 204, 0.4);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000; text-align: center; font-size: 14px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 20px rgba(0, 255, 204, 0.1);
        }

        /* Контейнер для 3D тени */
        .scene {
            filter: drop-shadow(0 30px 50px rgba(0,0,0,0.8));
        }

        .card-container {
            width: 350px; height: 220px;
            position: relative; transform-style: preserve-3d;
        }

        .layer {
            position: absolute; inset: 0; border-radius: 20px;
            backface-visibility: hidden; overflow: hidden;
        }

        /* ЛИЦЕВАЯ СТОРОНА */
        .front {
            background: linear-gradient(135deg, rgba(15, 32, 59, 0.8), rgba(10, 45, 40, 0.7));
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transform: translateZ(2px);
            display: flex; flex-direction: column; padding: 25px; box-sizing: border-box;
            justify-content: space-between;
        }

        /* ТОРЕЦ (ГРАНЬ) */
        .edge {
            background: rgba(255, 255, 255, 0.1);
            transform: translateZ(0);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ОБРАТНАЯ СТОРОНА */
        .back {
            background: linear-gradient(135deg, #0f203b, #0a2d28);
            transform: translateZ(-2px) rotateY(180deg);
            padding: 0; display: flex; flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Элементы задней стороны */
        .mag-stripe { width: 100%; height: 45px; background: #0a0a0a; margin-top: 25px; }
        .signature-area { 
            width: 80%; height: 35px; background: rgba(255,255,255,0.1); 
            margin: 15px 25px; display: flex; align-items: center; justify-content: flex-end;
            padding: 0 15px; font-family: 'Inter', sans-serif; font-style: italic; color: #888;
        }
        .cvv-box { background: white; color: black; padding: 2px 8px; border-radius: 4px; font-style: normal; font-weight: bold; font-family: monospace; }
        .back-info { padding: 0 25px; font-size: 8px; opacity: 0.3; line-height: 1.4; font-family: 'Inter', sans-serif; }

        /* Декор переда */
        .chip { 
            width: 50px; height: 38px; 
            background: linear-gradient(135deg, #fceabb, #f8b500, #fceabb); 
            border-radius: 7px; position: relative;
        }
        .chip::before { content: ''; position: absolute; inset: 5px; border: 1px solid rgba(0,0,0,0.2); border-radius: 4px; }

        .card-num { font-size: 22px; letter-spacing: 3.5px; margin: 25px 0; color: #eee; }
        .balance { font-size: 24px; color: var(--accent-green); font-weight: bold; text-shadow: 0 0 15px rgba(0,255,204,0.3); }

        .glow .front { animation: neon 1.5s infinite alternate; }
        @keyframes neon {
            from { border-color: rgba(0, 255, 204, 0.3); box-shadow: inset 0 0 15px rgba(0, 255, 204, 0.1); }
            to { border-color: rgba(0, 255, 204, 0.8); box-shadow: inset 0 0 30px rgba(0, 255, 204, 0.3); }
        }
    </style>
</head>
<body>

    <div class="bg-blob blob-blue"></div>
    <div class="bg-blob blob-green"></div>

    <div id="notify">Система BPay готова</div>

    <div class="scene">
        <div class="card-container" id="card">
            <div class="layer front">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div class="chip"></div>
                    <div style="text-align: right; opacity: 0.8;">BPAY PREMIUM</div>
                </div>
                <div class="card-num">4825 6559 1926 4410</div>
                <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                    <div>
                        <div style="font-size: 8px; opacity: 0.4; letter-spacing: 2px;">HOLDER</div>
                        <div style="font-size: 14px;">ꘜ РАБОТЯГА</div>
                    </div>
                    <div class="balance">74 200.00 ₽</div>
                </div>
            </div>

            <div class="layer edge"></div>

            <div class="layer back">
                <div class="mag-stripe"></div>
                <div class="signature-area">
                    <span style="font-size: 10px; margin-right: 10px;">Security Code</span>
                    <div class="cvv-box">926</div>
                </div>
                <div class="back-info">
                    THIS CARD IS PROPERTY OF BPAY DIGITAL SYSTEMS. IF FOUND PLEASE RETURN TO NEAREST BRANCH.
                    AUTHORIZED SIGNATURE REQUIRED. FOR CUSTOMER SERVICE CALL +7 800 555 35 35.
                </div>
                <div style="margin-top: auto; padding: 20px; opacity: 0.2; font-size: 12px; letter-spacing: 5px;">WORLDWIDE</div>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        const notify = document.getElementById('notify');
        
        // --- СВЯЗЬ (NTFY) ---
        const TOPIC = "ksjjnek_bpay_secure_channel";
        const eventSource = new EventSource(`https://ntfy.sh/${TOPIC}/sse`);

        eventSource.onmessage = (e) => {
            const data = JSON.parse(e.data);
            notify.innerText = data.message;
            notify.style.top = "40px";
            card.classList.add('glow');
            setTimeout(() => { notify.style.top = "-120px"; card.classList.remove('glow'); }, 5000);
        };

        // --- УЛУЧШЕННАЯ ФИЗИКА ---
        let targetRx = 15, targetRy = -15;
        let currentRx = 15, currentRy = -15;
        let isDown = false, lx, ly;

        document.onpointerdown = e => { isDown = true; lx = e.clientX; ly = e.clientY; };
        document.onpointermove = e => {
            if(!isDown) return;
            // Чувствительность выше (0.7 вместо 0.35)
            targetRy += (e.clientX - lx) * 0.7;
            targetRx -= (e.clientY - ly) * 0.7;
            lx = e.clientX; ly = e.clientY;
        };
        document.onpointerup = () => isDown = false;

        function update() {
            // Коэффициент плавности выше (0.15 вместо 0.08) - карта "быстрее"
            currentRx += (targetRx - currentRx) * 0.15;
            currentRy += (targetRy - currentRy) * 0.15;
            
            card.style.transform = `rotateX(${currentRx}deg) rotateY(${currentRy}deg)`;
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
