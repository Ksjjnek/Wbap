<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BPay Premium v3.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Полная блокировка системных сдвигов */
        html, body { 
            width: 100%; height: 100%; 
            margin: 0; padding: 0; 
            overflow: hidden; 
            background: #03070b; color: white;
            font-family: 'Orbitron', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .bg-blob { position: absolute; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.4; pointer-events: none; }
        .blob-blue { width: 300px; height: 300px; background: #0064ff; top: -50px; left: -50px; }
        .blob-green { width: 350px; height: 350px; background: #00ffcc; bottom: -50px; right: -50px; opacity: 0.15; }

        #notify {
            position: fixed; top: -120px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            padding: 15px 35px; border-radius: 50px;
            border: 1px solid rgba(0, 255, 204, 0.4);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000; font-size: 13px; text-align: center; pointer-events: none;
        }

        .scene { 
            perspective: 1200px; 
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.7));
            /* Ключевой фикс: запрещаем браузеру трогать жесты в этой зоне */
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
        }
        
        .card-container {
            width: 85vw; max-width: 350px; height: 54vw; max-height: 220px;
            position: relative; transform-style: preserve-3d;
            pointer-events: none; /* Чтобы события шли на сцену */
        }

        .layer { position: absolute; inset: 0; border-radius: 18px; backface-visibility: hidden; }

        .front {
            background: linear-gradient(135deg, rgba(15, 32, 59, 0.94), rgba(10, 45, 40, 0.85));
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.15);
            transform: translateZ(2px); display: flex; flex-direction: column; 
            padding: 22px; box-sizing: border-box; justify-content: space-between;
        }

        .back {
            background: #0a1525; transform: translateZ(-2px) rotateY(180deg);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .mag-stripe { width: 100%; height: 42px; background: #050505; margin-top: 25px; }
        .signature-bar { 
            width: 70%; height: 32px; background: rgba(255,255,255,0.1); 
            margin: 20px; display: flex; align-items: center; justify-content: flex-end; padding: 0 12px;
        }
        #cvv-val { background: white; color: black; padding: 2px 8px; border-radius: 3px; font-weight: bold; font-family: monospace; font-size: 14px; }

        .chip { width: 48px; height: 34px; background: linear-gradient(135deg, #fceabb, #f8b500); border-radius: 6px; }
        #card-num-val { font-size: 1.25rem; letter-spacing: 2px; margin: 18px 0; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        #balance-val { font-size: 1.5rem; color: #00ffcc; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,204,0.4); }

        .glow .front { animation: neon 1s infinite alternate; }
        @keyframes neon { from { border-color: rgba(0,255,204,0.3); } to { border-color: rgba(0,255,204,1); } }
    </style>
</head>
<body>

    <div class="bg-blob blob-blue"></div>
    <div class="bg-blob blob-green"></div>

    <div id="notify">Облако BPay активно</div>

    <div class="scene" id="touch-zone">
        <div class="card-container" id="card">
            <div class="layer front">
                <div style="display: flex; justify-content: space-between;">
                    <div class="chip"></div>
                    <div style="font-size: 12px; opacity: 0.7; font-weight: bold;">BPAY PREMIUM</div>
                </div>
                <div id="card-num-val">4825 6559 1926 4410</div>
                <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                    <div style="font-size: 13px; font-weight: bold;">ꘜ РАБОТЯГА</div>
                    <div id="balance-val">74 200.00 ₽</div>
                </div>
            </div>

            <div class="layer back">
                <div class="mag-stripe"></div>
                <div class="signature-bar">
                    <div id="cvv-val">926</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        const touchZone = document.getElementById('touch-zone');
        const notify = document.getElementById('notify');
        
        // --- ПРИЕМ ДАННЫХ ---
        const TOPIC = "ksjjnek_bpay_secure_channel";
        const eventSource = new EventSource(`https://ntfy.sh/${TOPIC}/sse`);

        eventSource.onmessage = (e) => {
            try {
                const payload = JSON.parse(e.data);
                const data = JSON.parse(payload.message);

                if (data.type === 'msg') {
                    notify.innerText = data.value;
                    notify.style.top = "30px";
                    card.classList.add('glow');
                    setTimeout(() => { notify.style.top = "-120px"; card.classList.remove('glow'); }, 4000);
                } 
                else if (data.type === 'balance') {
                    document.getElementById('balance-val').innerText = data.value;
                } 
                else if (data.type === 'card_info') {
                    const parts = data.value.split('|');
                    document.getElementById('card-num-val').innerText = parts[0];
                    document.getElementById('cvv-val').innerText = parts[1];
                }
            } catch(err) { console.log("Сырое сообщение ntfy"); }
        };

        // --- ИСПРАВЛЕННАЯ ФИЗИКА (БЕЗ ТОРМОЗОВ) ---
        let targetRx = 15, targetRy = -15;
        let currentRx = 15, currentRy = -15;
        let isDown = false, lx, ly;

        touchZone.onpointerdown = e => { 
            isDown = true; 
            lx = e.clientX; 
            ly = e.clientY;
            touchZone.setPointerCapture(e.pointerId); // Захватываем палец
        };

        touchZone.onpointermove = e => {
            if(!isDown) return;
            e.preventDefault(); // Запрещаем скролл страницы

            const deltaX = e.clientX - lx;
            const deltaY = e.clientY - ly;

            targetRy += deltaX * 0.6; 
            targetRx -= deltaY * 0.6;

            lx = e.clientX; 
            ly = e.clientY;
        };

        touchZone.onpointerup = e => { 
            isDown = false; 
            touchZone.releasePointerCapture(e.pointerId); 
        };

        function update() {
            // Мягкая интерполяция (0.15 — золотая середина между скоростью и плавностью)
            currentRx += (targetRx - currentRx) * 0.15;
            currentRy += (targetRy - currentRy) * 0.15;
            
            card.style.transform = `rotateX(${currentRx}deg) rotateY(${currentRy}deg)`;
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
