<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Покупка звезд</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            text-align: center;
            width: 80%;
            max-width: 350px;
        }
        h2 { margin-top: 0; color: #f5c518; }
        .info { color: #aaaaaa; font-size: 14px; margin-bottom: 20px; }
        .input-group { margin: 20px 0; }
        
        input[type="number"] {
            width: 100%;
            background-color: #2c2c2c;
            color: #fff;
            border: 2px solid #333;
            padding: 12px;
            font-size: 18px;
            border-radius: 10px;
            box-sizing: border-box;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="number"]:focus { border-color: #f5c518; }
        
        input[type="range"] {
            width: 100%;
            margin-top: 15px;
            accent-color: #f5c518;
        }
        
        .total { font-size: 18px; font-weight: bold; margin-top: 15px; }
        .total-price { color: #4caf50; font-size: 22px; }
    </style>
</head>
<body>

<div class="container">
    <h2>⭐ Магазин звезд</h2>
    <div class="info">Курс: 1 звезда = 1.25 ₽<br>Минимум 50 звезд</div>

    <div class="input-group">
        <input type="number" id="starInput" min="50" max="10000" value="50">
        <input type="range" id="starSlider" min="50" max="10000" value="50">
    </div>

    <div class="total">
        Итого: <span class="total-price" id="totalPrice">62.50</span> ₽
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // Расширяем на весь экран

    const input = document.getElementById('starInput');
    const slider = document.getElementById('starSlider');
    const total = document.getElementById('totalPrice');
    const PRICE_PER_STAR = 1.25;

    // Синхронизация полей и подсчет цены
    function updateValues(value) {
        let stars = parseInt(value);
        if (isNaN(stars) || stars < 50) stars = 50; // Защита от ввода меньше 50
        
        input.value = stars;
        slider.value = stars;
        
        const price = (stars * PRICE_PER_STAR).toFixed(2);
        total.innerText = price;

        tg.MainButton.setText(`ОФОРМИТЬ ЗА ${price} ₽`);
        if (!tg.MainButton.isVisible) tg.MainButton.show();
    }

    input.addEventListener('input', (e) => updateValues(e.target.value));
    slider.addEventListener('input', (e) => updateValues(e.target.value));

    // Настройка главной кнопки Telegram
    tg.MainButton.setText("ОФОРМИТЬ ЗА 62.50 ₽");
    tg.MainButton.color = "#f5c518";
    tg.MainButton.textColor = "#000000";
    tg.MainButton.show();

    // Отправка данных боту по нажатию
    tg.onEvent('mainButtonClicked', function() {
        const data = {
            stars: parseInt(input.value),
            price: (parseInt(input.value) * PRICE_PER_STAR).toFixed(2)
        };
        tg.sendData(JSON.stringify(data)); // Отправляет данные и закрывает Web App
    });
</script>

</body>
</html>
